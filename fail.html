<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, maximum-scale=5">
  <meta name="theme-color" content="#2563eb">
  <title>결제 실패 · JP 타임즈</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <header class="header"><h1><span class="brand">JP 타임즈</span></h1></header>
  <main class="container result-page fail">
    <h1>결제에 실패했습니다</h1>
    <p>오류 메시지를 확인한 뒤 다시 시도해 주세요.</p>
    <dl class="detail" id="failDetail">
      <dt>오류 코드</dt><dd id="code">-</dd>
      <dt>오류 메시지</dt><dd id="message">-</dd>
    </dl>
    <a href="pricing.html" class="btn btn-primary">다시 결제하기</a>
    <a href="index.html" class="btn" style="margin-left:0.5rem;background:var(--border);color:var(--text);">메인으로</a>
  </main>
  <footer class="footer"><p>© JP 타임즈</p></footer>
  <script>
    (function() {
      var params = new URLSearchParams(location.search);
      document.getElementById('code').textContent = params.get('code') || '-';
      document.getElementById('message').textContent = decodeURIComponent(params.get('message') || '-');
    })();
  </script>
</body>
</html>
