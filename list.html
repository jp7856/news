<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, maximum-scale=5" />
  <meta name="theme-color" content="#2563eb" />
  <title>기사 목록 · JP 타임즈</title>

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/style.css" />
</head>

<body>
  <header class="header">
    <h1><span class="brand">JP 타임즈</span></h1>
    <p class="tagline">기사 목록</p>
  </header>

  <main class="container">
    <div class="list-header">
      <a href="index.html" class="back-link">← 처음으로</a>
      <span id="levelBadge" class="level-badge elementary">초등</span>
    </div>

    <nav class="level-nav" aria-label="단계 이동">
      <a class="level-nav-link level-nav-link--elementary" href="list.html?level=elementary">초등</a>
      <a class="level-nav-link level-nav-link--middle" href="list.html?level=middle">중등</a>
      <a class="level-nav-link level-nav-link--high" href="list.html?level=high">고등</a>
    </nav>

    <div class="issue-selector">
      <label for="issueSelect">호수</label>
      <select id="issueSelect" aria-label="호수 선택"></select>
      <span id="listMessage" style="margin-left:.5rem;font-size:.85rem;color:#5f6368;"></span>
    </div>

    <section class="list-section">
      <h2 id="listSectionTitle" class="list-section-title">기사 목록</h2>
      <div id="articleList" class="article-grid" role="list"></div>
    </section>
  </main>

  <footer class="footer"><p>© JP 타임즈</p></footer>

  <script src="js/app.js"></script>
  <script>
    (async function () {
      var params = new URLSearchParams(location.search);
      var level = params.get("level") || "elementary";

      var titles = { elementary: "초등 기사", middle: "중등 기사", high: "고등 기사" };
      var titleClass = {
        elementary: "list-section-title--elementary",
        middle: "list-section-title--middle",
        high: "list-section-title--high",
      };
      var bylines = { elementary: "JP 타임즈 · 초등", middle: "JP 타임즈 · 중등", high: "JP 타임즈 · 고등" };
      var levelLabel = { elementary: "초등", middle: "중등", high: "고등" }[level] || level;

      var sectionTitle = document.getElementById("listSectionTitle");
      sectionTitle.textContent = titles[level] || "기사 목록";
      sectionTitle.className = "list-section-title " + (titleClass[level] || "");

      var levelBadge = document.getElementById("levelBadge");
      levelBadge.textContent = levelLabel;
      levelBadge.className = "level-badge " + level;

      var list = document.getElementById("articleList");
      list.classList.add("article-grid--" + level);

      var msg = document.getElementById("listMessage");
      function setMsg(t) { if (msg) msg.textContent = t || ""; }

      function getTitle(a, lv) {
        return a && a.title && typeof a.title === "object" ? a.title[lv] : (a ? a.title : "");
      }
      function getImg(a, lv) {
        if (!a) return "";
        if (a.image && typeof a.image === "object" && a.image[lv]) return a.image[lv];
        if (a.image && typeof a.image === "string") return a.image;
        return "";
      }

      var issueSelect = document.getElementById("issueSelect");

      async function fetchJson(url) {
        var r = await fetch(url, { cache: "no-store" });
        if (!r.ok) throw new Error(url + " fetch failed: " + r.status);
        return await r.json();
      }

      // 호수 목록 로드
      var issues;
      try {
        issues = await fetchJson("data/issues.json"); // [{issue, date}, ...]
      } catch (e) {
        console.error(e);
        setMsg("호수 목록 로드 실패: data/issues.json");
        return;
      }

      // 드롭다운 채우기
      issueSelect.innerHTML = "";
      issues.forEach(function (it) {
        var opt = document.createElement("option");
        opt.value = String(it.issue);
        opt.textContent = it.issue + "호 (" + it.date + ")";
        issueSelect.appendChild(opt);
      });

      // URL에 issue 있으면 선택
      var issueFromUrl = params.get("issue");
      if (issueFromUrl && Array.from(issueSelect.options).some(function (o) { return o.value === issueFromUrl; })) {
        issueSelect.value = issueFromUrl;
      } else {
        issueSelect.value = issueSelect.options[0] ? issueSelect.options[0].value : "";
      }

      var maxByLevel = { elementary: 5, middle: 8, high: 12 };
      var maxSeq = maxByLevel[level] || 12;

      async function renderIssue(issueNo) {
        list.innerHTML = "";
        setMsg("불러오는 중...");

        var issueData;
        try {
          issueData = await fetchJson("data/issues/" + issueNo + ".json");
        } catch (e) {
          console.error(e);
          setMsg("호수 파일이 없거나 읽기 실패: data/issues/" + issueNo + ".json");
          return;
        }

        var articles = issueData.ARTICLES || issueData.articles || {};
        if (!articles || typeof articles !== "object") {
          setMsg("ARTICLES 구조가 올바르지 않습니다.");
          return;
        }

        // ✅ 핵심: seq 목록 생성(이전 코드에 없어서 목록이 아예 안 나왔음)
        var seqs = Object.keys(articles)
          .map(Number)
          .filter(function (n) { return !isNaN(n); })
          .sort(function (a, b) { return a - b; })
          .slice(0, maxSeq);

        var dateLabel = issueData.date || "";
        var issueLabel = "제" + issueNo + "호_" + dateLabel;

        if (seqs.length === 0) {
          setMsg("표시할 기사가 없습니다. (ARTICLES 비어있음)");
          return;
        }

        setMsg("");

        seqs.forEach(function (seq) {
          var a = articles[String(seq)] || articles[seq];
          if (!a) return;

          var title = getTitle(a, level) || ("기사 " + seq);
          var img = getImg(a, level);

          var card = document.createElement("a");
          card.className = "article-card";
          card.href =
            "article.html?level=" + encodeURIComponent(level) +
            "&issue=" + encodeURIComponent(issueNo) +
            "&seq=" + encodeURIComponent(seq);

          var thumbHtml = img
            ? '<span class="article-card-thumb"><img src="' + img + '" alt="" loading="lazy"></span>'
            : '<span class="article-card-thumb article-card-thumb--empty"></span>';

          card.innerHTML =
            thumbHtml +
            '<span class="article-card-body">' +
            '<span class="article-card-issue">' + issueLabel + "</span>" +
            '<span class="article-card-title">' + title + "</span>" +
            '<span class="article-card-byline">' + (bylines[level] || "") + "</span>" +
            "</span>";

          list.appendChild(card);
        });
      }

      issueSelect.addEventListener("change", function () {
        var issueNo = issueSelect.value;
        var u = new URL(location.href);
        u.searchParams.set("issue", issueNo);
        history.replaceState(null, "", u.toString());
        renderIssue(issueNo);
      });

      if (issueSelect.value) {
        await renderIssue(issueSelect.value);
      } else {
        setMsg("호수 목록이 비어 있습니다.");
      }
    })();
  </script>
</body>
</html>
