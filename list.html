<script src="js/app.js"></script>
<script>
(async function() {
  var params = new URLSearchParams(location.search);
  var level = params.get('level') || 'elementary';

  var titles = { elementary: '초등 기사', middle: '중등 기사', high: '고등 기사' };
  var titleClass = { elementary: 'list-section-title--elementary', middle: 'list-section-title--middle', high: 'list-section-title--high' };
  var bylines = { elementary: 'JP 타임즈 · 초등', middle: 'JP 타임즈 · 중등', high: 'JP 타임즈 · 고등' };

  var sectionTitle = document.getElementById('listSectionTitle');
  sectionTitle.textContent = titles[level] || '기사 목록';
  sectionTitle.className = 'list-section-title ' + (titleClass[level] || '');

  var list = document.getElementById('articleList');
  list.classList.add('article-grid--' + level);

  // 메시지 영역(없으면 조용히 무시)
  var msg = document.getElementById('listMessage');
  function setMsg(t){ if (msg) msg.textContent = t || ''; }

  function getTitle(a, lv) { return a.title && typeof a.title === 'object' ? a.title[lv] : a.title; }
  function getImg(a, lv) { return a.image && a.image[lv] ? a.image[lv] : (a.image && typeof a.image === 'string' ? a.image : ''); }

  var issueSelect = document.getElementById('issueSelect');

  async function fetchJson(url){
    var r = await fetch(url, { cache: 'no-store' });
    if(!r.ok) throw new Error(url + ' fetch failed: ' + r.status);
    return await r.json();
  }

  // 호수 목록 로드
  var issues;
  try {
    issues = await fetchJson('data/issues.json'); // [{issue, date}, ...]
  } catch(e){
    console.error(e);
    setMsg('호수 목록 로드 실패: data/issues.json');
    return;
  }

  // 드롭다운 채우기
  issueSelect.innerHTML = '';
  issues.forEach(function(it) {
    var opt = document.createElement('option');
    opt.value = String(it.issue);
    opt.textContent = it.issue + '호 (' + it.date + ')';
    issueSelect.appendChild(opt);
  });

  // URL에 issue 있으면 선택
  var issueFromUrl = params.get('issue');
  if (issueFromUrl && Array.from(issueSelect.options).some(function(o){ return o.value === issueFromUrl; })) {
    issueSelect.value = issueFromUrl;
  } else {
    issueSelect.value = issueSelect.options[0].value; // 기본값
  }

  var maxByLevel = { elementary: 5, middle: 8, high: 12 };
  var maxSeq = maxByLevel[level] || 12;

  async function renderIssue(issueNo) {
    list.innerHTML = '';
    setMsg('불러오는 중...');

    var issueData;
    try {
      issueData = await fetchJson('data/issues/' + issueNo + '.json');
    } catch(e){
      console.error(e);
      setMsg('호수 파일이 없거나 읽기 실패: data/issues/' + issueNo + '.json');
      return;
    }

    var articles = issueData.ARTICLES || issueData.articles || {};
    if (!articles || (typeof articles !== 'object')) {
      setMsg('ARTICLES 구조가 올바르지 않습니다.');
      return;
    }

    var selectedOpt = issueSelect.options[issueSelect.selectedIndex];
    var m = selectedOpt && selectedOpt.text.match(/\d{4}\.\d{2}\.\d{2}/);
    var dateLabel = m ? m[0] : (issueData.date || '');
    var issueLabel = '제' + issueNo + '호_' + dateLabel;

 
    if (seqs.length === 0) {
      setMsg('표시할 기사가 없습니다. (ARTICLES 비어있음)');
      return;
    }

    setMsg('');

    seqs.forEach(function(seq) {
      var a = articles[seq];
      if (!a) return;

      var title = getTitle(a, level) || ('기사 ' + seq);
      var img = getImg(a, level);

      var card = document.createElement('a');
      card.className = 'article-card';
      card.href = 'article.html?level=' + encodeURIComponent(level) +
                  '&issue=' + encodeURIComponent(issueNo) +
                  '&seq=' + encodeURIComponent(seq);

      var thumbHtml = img
        ? '<span class="article-card-thumb"><img src="' + img + '" alt="" loading="lazy"></span>'
        : '<span class="article-card-thumb article-card-thumb--empty"></span>';

      card.innerHTML =
        thumbHtml +
        '<span class="article-card-body">' +
          '<span class="article-card-issue">' + issueLabel + '</span>' +
          '<span class="article-card-title">' + title + '</span>' +
          '<span class="article-card-byline">' + (bylines[level] || '') + '</span>' +
        '</span>';

      list.appendChild(card);
    });
  }

  issueSelect.addEventListener('change', function() {
    var issueNo = issueSelect.value;
    var u = new URL(location.href);
    u.searchParams.set('issue', issueNo);
    history.replaceState(null, '', u.toString());
    renderIssue(issueNo);
  });

  await renderIssue(issueSelect.value);
})();
</script>
