<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>JP 타임즈</title>

<link rel="stylesheet" href="css/style.css">

</head>

<body>

<header class="jp-header">
<div class="jp-brand">JP 타임즈</div>
<div class="jp-sub">주간 기사 읽기</div>
</header>


<main class="jp-wrap">

<a href="index.html" class="jp-back">← 메인으로</a>

<h1 id="levelTitle" class="jp-title"></h1>

<div id="articleList" class="jp-grid"></div>

</main>


<footer class="jp-footer">
© JP 타임즈
</footer>


<script src="js/articles.js"></script>

<script>

const params = new URLSearchParams(location.search);
const level = params.get("level") || "elementary";

const levelTitleMap = {
elementary: "초등 기사",
middle: "중등 기사",
high: "고등 기사"
};

const maxByLevel = {
elementary: 5,
middle: 8,
high: 12
};

document.getElementById("levelTitle").innerText = levelTitleMap[level];

const list = document.getElementById("articleList");

const articles = window.ARTICLES || {};

const seqs = Object.keys(articles)
.map(Number)
.sort((a,b)=>a-b);

let count = 0;

for(const seq of seqs){

const a = articles[seq];
if(!a) continue;

const title = a.title[level];
if(!title) continue;

const img = a.image[level] || "";

const card = document.createElement("a");
card.className = "jp-card";

card.href = `article.html?seq=${seq}&level=${level}`;

card.innerHTML = `

<div class="jp-card-thumb">
<img src="${img}" loading="lazy">
</div>

<div class="jp-card-body">

<div class="jp-card-issue">JP 타임즈</div>

<div class="jp-card-title">
${title}
</div>

<div class="jp-card-byline">
JP 타임즈 · ${level}
</div>

</div>

`;

list.appendChild(card);

count++;

if(count>=maxByLevel[level]) break;

}

</script>

</body>
</html>
